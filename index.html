<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Arcade</title>

<style>
body{
  margin:0;
  font-family: monospace;
  background:#cfefff;
  text-align:center;
  overflow:hidden;
}

/* SIMPLE HUD (NO BOXES) */
.hud{
  display:flex;
  justify-content:space-around;
  padding:10px;
  font-weight:bold;
}

/* MAIN CARD */
.card{
  margin:20px auto;
  width:260px;
  padding:20px;
  border:4px solid black;
  background:white;
}

.icon{
  font-size:70px;
}

.name{
  margin-top:10px;
  font-size:18px;
}

.desc{
  font-size:12px;
  margin-top:10px;
}

/* SIDE ICONS */
.side{
  opacity:0.3;
  font-size:40px;
}

.row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
}

button{
  padding:10px;
  margin:5px;
  border:3px solid black;
  background:#fff;
  cursor:pointer;
}

/* GAME */
#game{
  display:none;
  height:100vh;
}

#gameArea{
  position:relative;
  width:100%;
  height:80vh;
  overflow:hidden;
}

/* RESULT */
#result{
  display:none;
  margin-top:40px;
  font-size:20px;
}

/* MOBILE */
@media(max-width:600px){
  .card{width:90%;}
}
</style>
</head>

<body>

<div class="hud">
  <div id="player">P-0000</div>
  <div id="score">000</div>
  <div id="status">READY</div>
</div>

<div class="row">
  <div class="side" id="prev">🌊</div>

  <div class="card">
    <div class="icon" id="icon">🕶️</div>
    <div class="name" id="name">SUN GLASSES</div>
    <div class="desc" id="desc">Cool defensive item</div>
  </div>

  <div class="side" id="next">🍦</div>
</div>

<div class="buttons">
  <button onclick="prevItem()">◀</button>
  <button onclick="nextItem()">▶</button>
  <button onclick="confirm()">CONFIRM</button>
</div>

<!-- GAME -->
<div id="game">
  <h2>Tap Items!</h2>
  <div id="gameArea"></div>
</div>

<!-- RESULT -->
<div id="result"></div>

<script>
let items=[
 {icon:"🕶️",name:"SUN GLASSES",desc:"Cool defensive item"},
 {icon:"🍦",name:"ICE CREAM",desc:"Sweet energy boost"},
 {icon:"🏖️",name:"BEACH BALL",desc:"Fun playful item"},
 {icon:"🌊",name:"WAVES",desc:"Chill relaxing item"}
];

let i=0;
let score=0;
let player="P-"+Math.floor(Math.random()*9000);

document.getElementById("player").innerText=player;

function update(){
 document.getElementById("icon").innerText=items[i].icon;
 document.getElementById("name").innerText=items[i].name;
 document.getElementById("desc").innerText=items[i].desc;
 document.getElementById("prev").innerText=items[(i-1+items.length)%items.length].icon;
 document.getElementById("next").innerText=items[(i+1)%items.length].icon;
}

function nextItem(){ i=(i+1)%items.length; update(); }
function prevItem(){ i=(i-1+items.length)%items.length; update(); }

function confirm(){
 document.getElementById("status").innerText="STARTING...";
 setTimeout(startGame,1000);
}

function startGame(){
 document.getElementById("game").style.display="block";
 document.querySelector(".row").style.display="none";
 document.querySelector(".buttons").style.display="none";

 let area=document.getElementById("gameArea");
 let time=6;

 let spawn=setInterval(()=>{
   let obj=document.createElement("div");
   obj.innerText=items[i].icon;
   obj.style.position="absolute";
   obj.style.left=Math.random()*90+"%";
   obj.style.top="0px";
   obj.style.fontSize="30px";

   obj.onclick=()=>{score+=10; obj.remove();}

   area.appendChild(obj);

   let fall=setInterval(()=>{
     obj.style.top=(obj.offsetTop+5)+"px";
     if(obj.offsetTop>area.offsetHeight){
       obj.remove();
       clearInterval(fall);
     }
   },30);

 },500);

 let timer=setInterval(()=>{
   time--;
   if(time<=0){
     clearInterval(spawn);
     clearInterval(timer);
     showResult();
   }
 },1000);
}

function showResult(){
 document.getElementById("game").style.display="none";
 document.getElementById("result").style.display="block";
 document.getElementById("result").innerText=
 "STAY TUNED • MISSION START SOON • 10052026\nSCORE: "+score;
}

update();
</script>

</body>
</html>
